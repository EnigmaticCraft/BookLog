<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookLog - Your Reading Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 BookLog</h1>
            <p class="subtitle">Your Personal Reading Tracker</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('toRead')">To Read</button>
            <button class="tab-btn" onclick="showTab('haveRead')">Have Read</button>
            <button class="tab-btn" onclick="showTab('notes')">Notes</button>
        </div>

        <!-- To Read Tab -->
        <div id="toRead" class="tab-content active">
            <h2>Books to Read</h2>
            <div id="toReadList" class="book-list">
                <p class="empty-state">No books to read yet. Add some!</p>
            </div>
        </div>

        <!-- Have Read Tab -->
        <div id="haveRead" class="tab-content">
            <h2>Books You've Read</h2>
            <div id="haveReadList" class="book-list">
                <p class="empty-state">No books read yet. Start your reading journey!</p>
            </div>
        </div>

        <!-- Notes Tab -->
        <div id="notes" class="tab-content">
            <h2>Notes</h2>
            <div id="notesList" class="notes-list">
                <p class="empty-state">No notes yet.</p>
            </div>
        </div>

        <footer>
            <p>Last updated: <span id="lastUpdated"></span></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
